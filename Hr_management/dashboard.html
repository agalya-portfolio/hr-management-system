<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Employee Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f9f9f9;
            margin: 20px;
        }

        h2 {
            text-align: center;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            margin-top: 20px;
        }

        .card {
            background: #fff;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1);
        }

        canvas {
            width: 100% !important;
            height: 350px !important;
        }
    </style>
</head>

<body>
    <h2>📊 Employee Dashboard</h2>

    <!-- Cards -->
    <div class="grid">
        <div class="card">
            <canvas id="employeeCount"></canvas>
        </div>
        <div class="card">
            <canvas id="avgAge"></canvas>
        </div>
    </div>

    <!-- Charts -->
    <div class="grid">
        <div class="card">
            <canvas id="deptChart"></canvas>
        </div>
        <div class="card">
            <canvas id="genderChart"></canvas>
        </div>
        <div class="card">
            <canvas id="ageGroupChart"></canvas>
        </div>
        <div class="card">
            <canvas id="top5Chart"></canvas>
        </div>
    </div>

    <script>
        // Fetch data from PHP (JSON)
        fetch('data.php')
            .then(res => res.json())
            .then(data => {
                // Extract values
                const totalEmployees = data.length;
                const avgAge = (data.reduce((a, b) => a + b.age, 0) / totalEmployees).toFixed(1);

                // Dept count
                const deptCounts = {};
                data.forEach(e => deptCounts[e.department] = (deptCounts[e.department] || 0) + 1);

                // Gender count
                const genderCounts = {};
                data.forEach(e => genderCounts[e.gender] = (genderCounts[e.gender] || 0) + 1);

                // Age groups
                const ageGroups = { "<25": 0, "25-35": 0, "36-45": 0, "46-60": 0, ">60": 0 };
                data.forEach(e => {
                    if (e.age < 25) ageGroups["<25"]++;
                    else if (e.age <= 35) ageGroups["25-35"]++;
                    else if (e.age <= 45) ageGroups["36-45"]++;
                    else if (e.age <= 60) ageGroups["46-60"]++;
                    else ageGroups[">60"]++;
                });

                // Top 5 by score
                const top5 = [...data].sort((a, b) => b.score - a.score).slice(0, 5);

                // Employee Count Card
                new Chart(document.getElementById('employeeCount'), {
                    type: 'doughnut',
                    data: { labels: ['Employees'], datasets: [{ data: [totalEmployees], backgroundColor: ['#36A2EB'] }] },
                    options: { plugins: { title: { display: true, text: 'Total Employees' } } }
                });

                // Avg Age Card
                new Chart(document.getElementById('avgAge'), {
                    type: 'bar',
                    data: { labels: ['Avg Age'], datasets: [{ data: [avgAge], backgroundColor: ['#FF6384'] }] },
                    options: { plugins: { title: { display: true, text: 'Average Age' } } }
                });

                // Department Chart
                new Chart(document.getElementById('deptChart'), {
                    type: 'pie',
                    data: {
                        labels: Object.keys(deptCounts),
                        datasets: [{ data: Object.values(deptCounts), backgroundColor: ['#36A2EB', '#FF6384', '#FFCE56', '#4BC0C0', '#9966FF'] }]
                    },
                    options: { plugins: { title: { display: true, text: 'Department Wise Employees' } } }
                });

                // Gender Chart
                new Chart(document.getElementById('genderChart'), {
                    type: 'doughnut',
                    data: {
                        labels: Object.keys(genderCounts),
                        datasets: [{ data: Object.values(genderCounts), backgroundColor: ['#FF6384', '#36A2EB'] }]
                    },
                    options: { plugins: { title: { display: true, text: 'Gender Distribution' } } }
                });

                // Age Group Histogram
                new Chart(document.getElementById('ageGroupChart'), {
                    type: 'bar',
                    data: {
                        labels: Object.keys(ageGroups),
                        datasets: [{ label: 'Employees', data: Object.values(ageGroups), backgroundColor: '#4BC0C0' }]
                    },
                    options: { plugins: { title: { display: true, text: 'Age Group Distribution' } } }
                });

                // Top 5 Employees by Score
                new Chart(document.getElementById('top5Chart'), {
                    type: 'bar',
                    data: {
                        labels: top5.map(e => e.name),
                        datasets: [{ label: 'Project Score', data: top5.map(e => e.score), backgroundColor: '#9966FF' }]
                    },
                    options: { plugins: { title: { display: true, text: 'Top 5 Employees by Score' } } }
                });
            });
    </script>
</body>

</html>
